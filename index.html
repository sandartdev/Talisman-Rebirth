<!-- CAROUSEL SECTION -->
<section id="classes" class="classes">
    <h2>GAME CLASSES</h2>
    <div class="carousel-wrapper">
        <div class="carousel" id="classCarousel">
            <div class="carousel-item active">
                <div class="carousel-content">
                    <img src="https://raw.githubusercontent.com/sandartdev/Talisman-Rebirth/main/tamer.png" alt="Tamer" class="carousel-image">
                    <div class="carousel-text">
                        <h3>🐉 TAMER</h3>
                        <p>Master of creatures and control</p>
                    </div>
                </div>
            </div>
            <div class="carousel-item">
                <div class="carousel-content">
                    <img src="https://raw.githubusercontent.com/sandartdev/Talisman-Rebirth/main/assassin.png" alt="Assassin" class="carousel-image">
                    <div class="carousel-text">
                        <h3>🗡️ ASSASSIN</h3>
                        <p>Master of shadows and precision</p>
                    </div>
                </div>
            </div>
            <div class="carousel-item">
                <div class="carousel-content">
                    <img src="https://raw.githubusercontent.com/sandartdev/Talisman-Rebirth/main/wizard.png" alt="Wizard" class="carousel-image">
                    <div class="carousel-text">
                        <h3>🔥 WIZARD</h3>
                        <p>Master of arcane magic</p>
                    </div>
                </div>
            </div>
            <div class="carousel-item">
                <div class="carousel-content">
                    <img src="https://raw.githubusercontent.com/sandartdev/Talisman-Rebirth/main/monk.png" alt="Monk" class="carousel-image">
                    <div class="carousel-text">
                        <h3>🧘 MONK</h3>
                        <p>Master of inner strength</p>
                    </div>
                </div>
            </div>
            <div class="carousel-item">
                <div class="carousel-content">
                    <img src="https://raw.githubusercontent.com/sandartdev/Talisman-Rebirth/main/fairy.png" alt="Fairy" class="carousel-image">
                    <div class="carousel-text">
                        <h3>✨ FAIRY</h3>
                        <p>Master of nature and healing</p>
                    </div>
                </div>
            </div>
        </div>
        <button class="carousel-button prev" onclick="moveCarousel(-1)">❮</button>
        <button class="carousel-button next" onclick="moveCarousel(1)">❯</button>
    </div>
    <div class="carousel-dots">
        <span class="dot active" onclick="currentSlide(0)"></span>
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
    </div>
</section>
